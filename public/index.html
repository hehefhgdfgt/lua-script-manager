<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        @font-face {
            font-family: 'Fortnite';
            src: url('/fortnite.otf') format('opentype');
        }
        body {
            font-family: 'Fortnite', cursive;
            background: #111;
            color: #aaa;
            margin: 0;
            padding: 60px 20px;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            height: 350px;
            background: #fff;
            color: #000;
            border: 1px solid #444;
            padding: 18px;
            font-family: 'Fortnite', cursive;
            font-size: 32px;
            resize: vertical;
            box-sizing: border-box;
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            image-rendering: -webkit-optimize-contrast;
            letter-spacing: 1.2px;
        }
        textarea:focus {
            outline: none;
            border-color: #666;
        }
        button {
            width: 100%;
            margin-top: 15px;
            padding: 18px;
            background: #222;
            color: #ddd;
            border: 1px solid #444;
            font-family: 'Fortnite', cursive;
            font-size: 32px;
            cursor: pointer;
            letter-spacing: 1.2px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            image-rendering: -webkit-optimize-contrast;
        }
        button:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="commandForm">
            <textarea id="luaCode" placeholder="getgenv().MAHAHATESTING_gg_____ = {
    ['mahaha_testing'] = {
        ['print hello?'] = true
    }
}" required>script_key = ""

getgenv().MAHAHATESTING_gg_____ = {
    ['mahaha_testing'] = {
        ['print hello?'] = true
    }
}</textarea>
            <button type="submit">Save Script</button>
        </form>
    </div>

    <script>
        document.getElementById('commandForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = 'script_' + Date.now();
            
            const body = {
                name: name,
                luaCode: document.getElementById('luaCode').value,
                enabled: true,
                executeOnce: true,
                variables: {}
            };
            
            try {
                const res = await fetch(`/api/commands`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await res.json();
                if (data.success) {
                    // Don't reset the form to preserve the preset
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
    </script>
</body>
</html>
