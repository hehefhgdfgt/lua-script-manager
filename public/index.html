<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #090909;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .editor-container {
            width: 700px;
            height: 500px;
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
        }

        #script_editor {
            width: 100%;
            height: 100%;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            padding: 10px;
            border: none;
            resize: none;
            outline: none;
        }

        .save-button {
            width: 700px;
            margin-top: 10px;
            padding: 12px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #333;
            border-radius: 4px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            cursor: pointer;
        }

        .save-button:hover {
            background-color: #2e2e2e;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <textarea id="script_editor" placeholder="Enter your script here...">shared.bottega_veneta = {
    ['Main'] = {
        ['Keybind'] = {
            ['Silent Aim'] = { 'C', 'Toggle' },
            ['Aim Assist'] = { 'X', 'Toggle' },
            ['Triggerbot'] = { 'V', 'Toggle' },
            ['Macro'] = { 'S', 'Hold' },
            ['Esp'] = 'V'
        },
        ['Target'] = {
            ['Mode'] = 'Target',
            ['Unlock'] = {
                ['Knocked'] = true,
                ['Grabbed'] = true,
            },
        },
    },

    ['Combat'] = {
        ['Silent Aim'] = {
            ['Enabled'] = true,
			['Force Hit'] = true,
            ['Hitpart'] = {
                'Head',
                'HumanoidRootPart'
            },
            ['Weapon Configuration'] = {
                ['[Double-Barrel SG]'] = true,
                ['[Revolver]'] = false,
                ['[TacticalShotgun]'] = true,
            },
        },
        ['Aim Assist'] = {
            ['Enabled'] = true,
            ['Hitpart'] = {
                'Head',
                'HumanoidRootPart'
            },
            ["Smoothing"] = 0.5,
            ['Weapon Configuration'] = {
                ['[Double-Barrel SG]'] = true,
                ['[Revolver]'] = true,
                ['[TacticalShotgun]'] = true,
            }
        },
        ['Triggerbot'] = {
            ['Enabled'] = true,
            ['Delay'] = 0.01,
            ['Weapon Configuration'] = {
                ['[Double-Barrel SG]'] = true,
                ['[Revolver]'] = true,
                ['[TacticalShotgun]'] = true,
            },
        },
        ['Distance Check'] = {
            ['Enabled'] = true,
            ['Max Distance'] = 300,
        },
    },

	['Tools'] = {
		['Mods'] = {
            ['Hitbox Expander'] = {
                ['Enabled'] = true,
                ['X'] = 2,
                ['Y'] = 2,
                ['Z'] = 2
            },

            ['Spread'] = {
                ['Enabled'] = true,
                ['Guns'] = {
                    ['[Double-Barrel SG]'] = 0.77,
                    ['[TacticalShotgun]'] = 0.77,
                },
            },

            ['Delay'] = {
                ['Enabled'] = false,
                ['Guns'] = {
                    ['[Double-Barrel SG]'] = 0,
                    ['[Revolver]'] = 0,
                    ['[TacticalShotgun]'] = 0,
                },
            },
        },
        ['Visual Mods'] = { 
            ['Skin Changer'] = {
                ['Enabled'] = true,
                ['Skins'] = {
                    ['[Double-Barrel SG]'] = 'Galaxy',
                    ['[Revolver]'] = 'Galaxy',
                    ['[TacticalShotgun]'] = 'Galaxy',
                    ['[Knife]'] = 'Love Kukri',
                },
            },
        },
    },

	['Character'] = {
		['Macro'] = {
        	['Enabled'] = true,
        	['Keybind'] = { 'Z', 'Toggle' },
        	['Delay'] = 0.014,
        	['Mode'] = 'First Person',
    	},
    },

    ['Visuals'] = {
        ['Fov'] = {
            ['Enabled'] = true,
            ['Visible'] = true,
            ['Size'] = 11150,
            ['Color'] = Color3.fromRGB(255, 255, 255),
        },
        ['Esp'] = {
            ['Enabled'] = true,
            ['Font'] = Enum.Font.Bangers,
            ['Name'] = {
                ['Enabled'] = true,
                ['Color'] = Color3.fromRGB(255, 255, 255),
                ['Position'] = 'Bottom',
            },
        },
    },

    ['No Jump Cooldown'] = {
        ['Enabled'] = true,
    },
}</textarea>
    </div>
    <button class="save-button" id="saveButton">Save Script</button>

    <script>
        document.getElementById('saveButton').addEventListener('click', async (e) => {
            e.preventDefault();
            
            const name = 'script_' + Date.now();
            
            const body = {
                name: name,
                luaCode: document.getElementById('script_editor').value,
                enabled: true,
                executeOnce: true,
                variables: {}
            };
            
            try {
                const res = await fetch(`/api/commands`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await res.json();
                if (data.success) {
                    // Don't reset to preserve the preset
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
    </script>
</body>
</html>
