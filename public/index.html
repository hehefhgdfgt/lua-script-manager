<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            font-family: sans-serif;
            background: #000;
            color: #888;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        textarea {
            width: 100%;
            height: 300px;
            background: #fff;
            color: #000;
            border: 1px solid #333;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }
        textarea:focus {
            outline: none;
            border-color: #000;
        }
        button {
            width: 100%;
            margin-top: 15px;
            padding: 15px;
            background: #000;
            color: #fff;
            border: 1px solid #333;
            font-size: 14px;
            cursor: pointer;
        }
        button:hover {
            background: #222;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="commandForm">
            <textarea id="luaCode" placeholder="-- please enter script here. example : print("website configuration")" required>print("website configuration")</textarea>
            <button type="submit">Save Script</button>
        </form>
    </div>

    <script>
        document.getElementById('commandForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = 'script_' + Date.now();
            
            const body = {
                name: name,
                luaCode: document.getElementById('luaCode').value,
                enabled: true,
                executeOnce: true,
                variables: {}
            };
            
            try {
                const res = await fetch(`/api/commands`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await res.json();
                if (data.success) {
                    document.getElementById('commandForm').reset();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
    </script>
</body>
</html>
