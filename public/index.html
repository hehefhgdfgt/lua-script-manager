<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        @font-face {
            font-family: 'Fortnite';
            src: url('/fortnite.otf') format('opentype');
        }
        body {
            font-family: 'Fortnite', cursive;
            background: #111;
            color: #aaa;
            margin: 0;
            padding: 60px 20px;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            height: 450px;
            background: #fff;
            color: #000;
            border: 1px solid #444;
            padding: 14px;
            font-family: 'Fortnite', cursive;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            line-height: 1.3;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            image-rendering: -webkit-optimize-contrast;
            letter-spacing: 0.5px;
        }
        textarea:focus {
            outline: none;
            border-color: #666;
        }
        button {
            width: 100%;
            margin-top: 15px;
            padding: 18px;
            background: #222;
            color: #ddd;
            border: 1px solid #444;
            font-family: 'Fortnite', cursive;
            font-size: 32px;
            cursor: pointer;
            letter-spacing: 1.2px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            image-rendering: -webkit-optimize-contrast;
        }
        button:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="commandForm">
            <textarea id="luaCode" placeholder="getgenv().MAHAHATESTING_gg_____ = {
    ['mahaha_testing'] = {
        ['print hello?'] = true
    }
}" required>shared.bottega_veneta = {
    ['Main'] = {
        ['Keybind'] = {
            ['Silent Aim'] = { 'C', 'Toggle' },
            ['Aim Assist'] = { 'X', 'Toggle' },
            ['Triggerbot'] = { 'V', 'Toggle' },
            ['Macro'] = { 'S', 'Hold' },
            ['Esp'] = 'V'
        },
        ['Target'] = {
            ['Mode'] = 'Target',
            ['Unlock'] = {
                ['Knocked'] = true,
                ['Grabbed'] = true,
            },
        },
    },

    ['Combat'] = {
        ['Silent Aim'] = {
            ['Enabled'] = true,
			['Force Hit'] = true,
            ['Hitpart'] = {
                'Head',
                'HumanoidRootPart'
            },
            ['Weapon Configuration'] = {
                ['[Double-Barrel SG]'] = true,
                ['[Revolver]'] = false,
                ['[TacticalShotgun]'] = true,
            },
        },
        ['Aim Assist'] = {
            ['Enabled'] = true,
            ['Hitpart'] = {
                'Head',
                'HumanoidRootPart'
            },
            ["Smoothing"] = 0.5,
            ['Weapon Configuration'] = {
                ['[Double-Barrel SG]'] = true,
                ['[Revolver]'] = true,
                ['[TacticalShotgun]'] = true,
            }
        },
        ['Triggerbot'] = {
            ['Enabled'] = true,
            ['Delay'] = 0.01,
            ['Weapon Configuration'] = {
                ['[Double-Barrel SG]'] = true,
                ['[Revolver]'] = true,
                ['[TacticalShotgun]'] = true,
            },
        },
        ['Distance Check'] = {
            ['Enabled'] = true,
            ['Max Distance'] = 300,
        },
    },

	['Tools'] = {
		['Mods'] = {
            ['Hitbox Expander'] = {
                ['Enabled'] = true,
                ['X'] = 2,
                ['Y'] = 2,
                ['Z'] = 2
            },

            ['Spread'] = {
                ['Enabled'] = true,
                ['Guns'] = {
                    ['[Double-Barrel SG]'] = 0.77,
                    ['[TacticalShotgun]'] = 0.77,
                },
            },

            ['Delay'] = {
                ['Enabled'] = false,
                ['Guns'] = {
                    ['[Double-Barrel SG]'] = 0,
                    ['[Revolver]'] = 0,
                    ['[TacticalShotgun]'] = 0,
                },
            },
        },
        ['Visual Mods'] = { 
            ['Skin Changer'] = {
                ['Enabled'] = true,
                ['Skins'] = {
                    ['[Double-Barrel SG]'] = 'Galaxy',
                    ['[Revolver]'] = 'Galaxy',
                    ['[TacticalShotgun]'] = 'Galaxy',
                    ['[Knife]'] = 'Love Kukri',
                },
            },
        },
    },

	['Character'] = {
		['Macro'] = {
        	['Enabled'] = true,
        	['Keybind'] = { 'Z', 'Toggle' },
        	['Delay'] = 0.014,
        	['Mode'] = 'First Person',
    	},
    },

    ['Visuals'] = {
        ['Fov'] = {
            ['Enabled'] = true,
            ['Visible'] = true,
            ['Size'] = 11150,
            ['Color'] = Color3.fromRGB(255, 255, 255),
        },
        ['Esp'] = {
            ['Enabled'] = true,
            ['Font'] = Enum.Font.Bangers,
            ['Name'] = {
                ['Enabled'] = true,
                ['Color'] = Color3.fromRGB(255, 255, 255),
                ['Position'] = 'Bottom',
            },
        },
    },

    ['No Jump Cooldown'] = {
        ['Enabled'] = true,
    },
}</textarea>
            <button type="submit">Save Script</button>
        </form>
    </div>

    <script>
        document.getElementById('commandForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = 'script_' + Date.now();
            
            const body = {
                name: name,
                luaCode: document.getElementById('luaCode').value,
                enabled: true,
                executeOnce: true,
                variables: {}
            };
            
            try {
                const res = await fetch(`/api/commands`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await res.json();
                if (data.success) {
                    // Don't reset the form to preserve the preset
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
    </script>
</body>
</html>
